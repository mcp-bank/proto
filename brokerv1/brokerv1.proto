syntax = "proto3";
package brokerv1;
option go_package = "github.com/mcp-bank/proto/gen/brokerv1";

service BrokerService {
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc GetStockPrice(GetStockPriceRequest) returns (GetStockPriceResponse);
  rpc GetAccountBalance(GetAccountBalanceRequest) returns (GetAccountBalanceResponse);
  rpc GetNews(GetNewsRequest) returns (GetNewsResponse);
}

message GetPortfolioRequest {
  string uuid = 1;
}

message GetPortfolioResponse {
  repeated PortfolioPosition positions = 1;
}

message PortfolioPosition {
  string name = 1;
  string type = 2;
  double quantity = 3;
  Money price = 4;
}

message Money {
  int64 amount = 1;
  string currency = 2;
}

message GetStockPriceRequest {
  string isin = 1;
}

message GetStockPriceResponse {
  Money price = 1;
}

message GetAccountBalanceRequest {
  string uuid = 1;
}

message GetAccountBalanceResponse {
  Money balance = 1;
}

message GetNewsRequest {
  string isin = 1;
}

message GetNewsResponse {
  repeated NewsItem items = 1;
}

message NewsItem {
  string title = 1;
  string summary = 2;
  string url = 3;
}